# Despliegue de ProductosChinos (Angular) en Netlify
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build:netlify"
  publish = "dist/ProductosChinos/browser"
  functions = "netlify/functions"



# Redirección SPA: todas las rutas al index.html (Netlify ya atiende /.netlify/functions/* sin esta regla)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
